name: Daily Research Check-in

on:
  schedule:
    - cron: "5 0 * * *"
      timezone: "Asia/Shanghai"
    - cron: "5 12 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-research-check-in
  cancel-in-progress: false

jobs:
  daily-check-in:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update daily activity log
        run: bash scripts/update-daily-log.sh

      - name: Commit and push if changed
        shell: bash
        env:
          GIT_AUTHOR_NAME: ${{ vars.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.GIT_AUTHOR_EMAIL }}
        run: |
          set -euo pipefail

          if git diff --quiet -- activity/daily-log.csv; then
            echo "No new daily check-in to commit."
            exit 0
          fi

          today="$(date +%F)"
          author_name="${GIT_AUTHOR_NAME:-${GITHUB_REPOSITORY_OWNER}}"
          author_email="${GIT_AUTHOR_EMAIL:-}"

          if [ -z "${author_email}" ]; then
            echo "::error::Set repository variable GIT_AUTHOR_EMAIL to your GitHub noreply email."
            exit 1
          fi

          git config user.name "${author_name}"
          git config user.email "${author_email}"

          git add activity/daily-log.csv
          git commit -m "chore: daily research check-in ${today}"
          git push
